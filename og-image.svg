      <stop offset="0" stop-color="#15151f"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="120" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 20 Q30 5 60 20 T120 20" stroke="#1d1d28" stroke-width="1" fill="none"/>
      <path d="M0 30 Q30 18 60 30 T120 30" stroke="#1d1d28" stroke-width="1" fill="none"/>
