    <rect x="0" y="60" width="260" height="44" rx="6" fill="#d4a574" fill-opacity="0.18" stroke-width="3"/>
    <path d="M10 104 L20 130 L30 104 L40 130 L50 104 L60 130 L70 104 L80 130 L90 104 L100 130 L110 104 L120 130 L130 104 L140 130 L150 104 L160 130 L170 104 L180 130 L190 104 L200 130 L210 104 L220 130 L230 104 L240 130 L250 104"
