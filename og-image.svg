    <rect x="-30" y="40" width="50" height="84" rx="10" fill="#5a3a1c" stroke-width="3"/>
  </g>

  <text x="430" y="240" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="120" font-weight="800" fill="#d4a574" letter-spacing="2">Carpenter</text>
